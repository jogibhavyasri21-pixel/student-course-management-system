<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Management System</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <header>
        <h1>
            <i class="fa-solid fa-graduation-cap"></i>
            Student Course Management System
        </h1>
        <p class="subtitle">
            Manage student records efficiently and easily.
        </p>
    </header>

    <!-- Dashboard -->
    <div class="dashboard">

        <div class="card">
            <i class="fa-solid fa-users fa-2x"></i>
            <h2 id="totalStudents">0</h2>
            <p>Total Students</p>
        </div>

    </div>

    <!-- Student Form -->
    <div class="form-container">

        <h2>
            <i class="fa-solid fa-user-plus"></i>
            Add Student
        </h2>

        <form id="studentForm">

            <input
                type="text"
                id="name"
                placeholder="Student Name"
                required>

            <input
                type="text"
                id="roll"
                placeholder="Roll Number"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>

            <input
                type="text"
                id="department"
                placeholder="Department (e.g. CSE)"
                required>

            <select id="course" required>
                <option value="">Select Course</option>
                <option>CSE</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>Mechanical</option>
                <option>Civil</option>
                <option>AIML</option>
            </select>

            <button type="submit" id="submitBtn">
                <i class="fa-solid fa-user-plus"></i>
                <span>Add Student</span>
            </button>

        </form>

    </div>

    <!-- Search -->
    <div class="search-box">

        <input
            type="text"
            id="search"
            placeholder="🔍 Search by Name, Roll, Department or Course">

    </div>

    <!-- Student Table -->
    <div class="table-container">

        <table>

            <thead>

                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody id="studentList">

                <tr class="empty-row">
                    <td colspan="6">
                        <i class="fa-solid fa-circle-info"></i>
                        No Students Added Yet
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Student Course Management System | Built with HTML, CSS & JavaScript</p>
    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
